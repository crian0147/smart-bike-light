name: smart_bike_light
description: Smart Bike Light Mobile App
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_blue_plus: ^1.12.0
  location: ^5.0.3
  google_maps_flutter: ^2.5.0
  sensors_plus: ^4.0.1
  vibration: ^2.0.0
  intl: ^0.18.0
  flutter_svg: ^2.0.9
  animated_bottom_navigation_bar: ^1.3.0
  flutter_animated_button: ^2.0.3
  flutter_spinkit: ^5.2.0
  logger: ^2.0.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
  
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700